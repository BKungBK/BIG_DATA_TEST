<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Learning Platform</title>
  <meta name="description" content="Interactive quiz learning platform with analytics and progress tracking">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card: #16213e;
      --card-hover: #1a2744;
      --primary: #6c63ff;
      --primary-glow: rgba(108, 99, 255, .3);
      --secondary: #00d2ff;
      --accent: #ff6b9d;
      --success: #00e676;
      --error: #ff5252;
      --warning: #ffd740;
      --text: #e8e8f0;
      --text-dim: #8888aa;
      --text-muted: #555570;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0, 0, 0, .3);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 30px 0 20px;
      position: relative
    }

    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.5px
    }

    .header p {
      color: var(--text-dim);
      margin-top: 6px;
      font-size: .95rem
    }

    /* SCREEN */
    .screen {
      display: none;
      animation: fadeUp .4s ease
    }

    .screen.active {
      display: block
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.05)
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      20%,
      60% {
        transform: translateX(-6px)
      }

      40%,
      80% {
        transform: translateX(6px)
      }
    }

    @keyframes scoreReveal {
      from {
        stroke-dashoffset: 339.292
      }

      to {
        stroke-dashoffset: var(--target)
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    /* CHAPTER CARDS */
    .chapters {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 20px
    }

    .ch-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .3s ease;
      position: relative;
      overflow: hidden
    }

    .ch-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      border-radius: var(--radius) var(--radius) 0 0
    }

    .ch-card:nth-child(1)::before {
      background: linear-gradient(90deg, #6c63ff, #7f78ff)
    }

    .ch-card:nth-child(2)::before {
      background: linear-gradient(90deg, #00e676, #69f0ae)
    }

    .ch-card:nth-child(3)::before {
      background: linear-gradient(90deg, #ff9800, #ffb74d)
    }

    .ch-card:nth-child(4)::before {
      background: linear-gradient(90deg, #ff5252, #ff8a80)
    }

    .ch-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 12px 40px rgba(108, 99, 255, .15)
    }

    .ch-card h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .ch-card .ch-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem
    }

    .ch-card:nth-child(1) .ch-icon {
      background: rgba(108, 99, 255, .15);
      color: #6c63ff
    }

    .ch-card:nth-child(2) .ch-icon {
      background: rgba(0, 230, 118, .15);
      color: #00e676
    }

    .ch-card:nth-child(3) .ch-icon {
      background: rgba(255, 152, 0, .15);
      color: #ff9800
    }

    .ch-card:nth-child(4) .ch-icon {
      background: rgba(255, 82, 82, .15);
      color: #ff5252
    }

    .ch-card .ch-desc {
      color: var(--text-dim);
      font-size: .85rem;
      margin-bottom: 14px;
      line-height: 1.5
    }

    .ch-card .ch-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .8rem;
      color: var(--text-muted)
    }

    .ch-card .ch-score {
      color: var(--secondary);
      font-weight: 600
    }

    .ch-card .ch-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600
    }

    .badge-new {
      background: rgba(108, 99, 255, .15);
      color: var(--primary)
    }

    .badge-done {
      background: rgba(0, 230, 118, .15);
      color: var(--success)
    }

    .badge-retry {
      background: rgba(255, 215, 64, .15);
      color: var(--warning)
    }

    /* GLOBAL STATS */
    .global-stats {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px;
      text-align: center
    }

    .gs-item .gs-val {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--secondary)
    }

    .gs-item .gs-lbl {
      font-size: .75rem;
      color: var(--text-dim);
      margin-top: 2px
    }

    /* QUIZ SCREEN */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px
    }

    .quiz-title {
      font-size: 1rem;
      color: var(--text-dim)
    }

    .quiz-counter {
      font-size: .9rem;
      color: var(--secondary);
      font-weight: 600
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--surface);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 28px
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 6px;
      transition: width .4s ease
    }

    .q-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, .04)
    }

    .q-text {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 6px
    }

    .q-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: .7rem;
      background: rgba(108, 99, 255, .12);
      color: var(--primary);
      margin-bottom: 20px
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .choice-btn {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      text-align: left;
      cursor: pointer;
      font-size: .95rem;
      color: var(--text);
      transition: all .25s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.5
    }

    .choice-btn:hover:not(.locked) {
      background: var(--card-hover);
      border-color: var(--primary);
      transform: translateX(4px)
    }

    .choice-btn.locked {
      cursor: default
    }

    .choice-btn .c-label {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .8rem;
      background: rgba(255, 255, 255, .05);
      flex-shrink: 0;
      transition: all .25s ease
    }

    .choice-btn.correct {
      background: rgba(0, 230, 118, .08);
      border-color: var(--success)
    }

    .choice-btn.correct .c-label {
      background: var(--success);
      color: #000
    }

    .choice-btn.wrong {
      background: rgba(255, 82, 82, .08);
      border-color: var(--error);
      animation: shake .4s ease
    }

    .choice-btn.wrong .c-label {
      background: var(--error);
      color: #fff
    }

    /* EXPLANATION */
    .explanation {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 20px;
      margin-top: 18px;
      border-left: 4px solid var(--primary);
      display: none;
      animation: fadeUp .3s ease
    }

    .explanation.show {
      display: block
    }

    .explanation h4 {
      font-size: .85rem;
      color: var(--primary);
      margin-bottom: 8px
    }

    .explanation .exp-short {
      color: var(--text);
      font-size: .9rem;
      line-height: 1.6;
      margin-bottom: 10px
    }

    .explanation .exp-deep {
      color: var(--text-dim);
      font-size: .82rem;
      line-height: 1.6
    }

    .explanation .exp-toggle {
      color: var(--secondary);
      cursor: pointer;
      font-size: .8rem;
      margin-top: 6px;
      display: inline-block
    }

    /* NAV BUTTONS */
    .quiz-nav {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
      gap: 12px
    }

    .btn {
      padding: 12px 28px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: all .25s ease
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #8b83ff);
      color: #fff
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--primary-glow)
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, .08)
    }

    .btn-secondary:hover {
      border-color: var(--primary)
    }

    .btn-danger {
      background: rgba(255, 82, 82, .12);
      color: var(--error)
    }

    .btn-danger:hover {
      background: rgba(255, 82, 82, .2)
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none !important
    }

    /* RESULT SCREEN */
    .result-hero {
      text-align: center;
      padding: 30px 0
    }

    .score-ring {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 20px
    }

    .score-ring svg {
      transform: rotate(-90deg)
    }

    .score-ring circle {
      fill: none;
      stroke-width: 10
    }

    .score-ring .bg {
      stroke: var(--surface)
    }

    .score-ring .fg {
      stroke-linecap: round;
      transition: stroke-dashoffset 1.5s ease
    }

    .score-ring .score-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center
    }

    .score-ring .score-num {
      font-size: 2.4rem;
      font-weight: 700
    }

    .score-ring .score-of {
      font-size: .75rem;
      color: var(--text-dim)
    }

    .result-grade {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 10px 0 4px
    }

    .result-msg {
      color: var(--text-dim);
      font-size: .9rem
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 14px;
      margin: 24px 0
    }

    .metric-card {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 18px;
      text-align: center
    }

    .metric-card .m-val {
      font-size: 1.5rem;
      font-weight: 700
    }

    .metric-card .m-lbl {
      font-size: .75rem;
      color: var(--text-dim);
      margin-top: 4px
    }

    /* WEAKNESS PANEL */
    .weakness-panel {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      margin: 20px 0;
      border: 1px solid rgba(255, 215, 64, .12)
    }

    .weakness-panel h3 {
      color: var(--warning);
      font-size: 1rem;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .weakness-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .04)
    }

    .weakness-item:last-child {
      border: none
    }

    .weakness-item .w-tag {
      font-size: .9rem
    }

    .weakness-item .w-count {
      color: var(--error);
      font-weight: 600;
      font-size: .85rem
    }

    .weakness-item .w-tip {
      color: var(--text-dim);
      font-size: .78rem;
      margin-top: 2px
    }

    /* REVIEW LIST */
    .review-panel {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      margin: 20px 0
    }

    .review-panel h3 {
      font-size: 1rem;
      margin-bottom: 14px
    }

    .review-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      animation: slideIn .3s ease
    }

    .review-item:last-child {
      border: none
    }

    .review-item .r-q {
      font-size: .9rem;
      font-weight: 500;
      margin-bottom: 6px
    }

    .review-item .r-your {
      font-size: .82rem;
      color: var(--error)
    }

    .review-item .r-correct {
      font-size: .82rem;
      color: var(--success)
    }

    .review-item .r-exp {
      font-size: .78rem;
      color: var(--text-dim);
      margin-top: 4px;
      line-height: 1.5
    }

    .review-item.was-correct .r-your {
      color: var(--success)
    }

    /* RESULT ACTIONS */
    .result-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 24px
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 30px 0;
      color: var(--text-muted);
      font-size: .75rem
    }

    /* RESPONSIVE */
    @media(max-width:600px) {
      .app {
        padding: 14px
      }

      .header h1 {
        font-size: 1.5rem
      }

      .chapters {
        grid-template-columns: 1fr
      }

      .q-text {
        font-size: 1rem
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr)
      }
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      color: var(--text);
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      font-size: .88rem;
      transition: transform .3s ease;
      z-index: 999;
      border: 1px solid rgba(255, 255, 255, .06)
    }

    .toast.show {
      transform: translateX(-50%) translateY(0)
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <!-- HOME SCREEN -->
    <div class="screen active" id="homeScreen">
      <div class="header">
        <h1>🎓 Quiz Learning Platform</h1>
        <p>เลือกบทเรียนเพื่อเริ่มทดสอบความรู้</p>
      </div>
      <div class="chapters" id="chapterList"></div>
      <div class="global-stats" id="globalStats"></div>
      <div class="footer">Quiz Learning Platform &copy; 2026 — Powered by Vanilla JS</div>
    </div>
    <!-- QUIZ SCREEN -->
    <div class="screen" id="quizScreen">
      <div class="quiz-header">
        <button class="btn btn-secondary" onclick="QZ.backToMenu()" aria-label="Back to menu">← เมนูหลัก</button>
        <span class="quiz-title" id="quizTitle"></span>
        <span class="quiz-counter" id="quizCounter"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div id="questionArea"></div>
      <div class="quiz-nav">
        <button class="btn btn-primary" id="nextBtn" onclick="QZ.next()" disabled>ถัดไป →</button>
      </div>
    </div>
    <!-- RESULT SCREEN -->
    <div class="screen" id="resultScreen">
      <div class="quiz-header">
        <button class="btn btn-secondary" onclick="QZ.backToMenu()">← เมนูหลัก</button>
        <span class="quiz-title" id="resultTitle"></span>
        <span></span>
      </div>
      <div class="result-hero" id="resultHero"></div>
      <div class="metrics" id="metricsArea"></div>
      <div id="weaknessArea"></div>
      <div class="review-panel" id="reviewPanel">
        <h3>📋 รายละเอียดทุกข้อ</h3>
        <div id="reviewList"></div>
      </div>
      <div class="result-actions" id="resultActions"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    "use strict";
    /* ============================================================
       QUESTION DATA BANK — 30 questions per chapter
       ============================================================ */
    const QUESTION_BANK = {
      ch1: [
        { q: "Big Data Ecosystem คืออะไร?", choices: ["ระบบจัดการฐานข้อมูลเชิงสัมพันธ์", "โครงสร้างของเทคโนโลยี เครื่องมือ และกระบวนการที่ใช้จัดการข้อมูลขนาดใหญ่", "ซอฟต์แวร์สำหรับสร้างเว็บไซต์", "ระบบปฏิบัติการสำหรับเซิร์ฟเวอร์"], correct: 1, explanationShort: "Big Data Ecosystem = โครงสร้างรวมของเทคโนโลยี เครื่องมือ และกระบวนการจัดการข้อมูลขนาดใหญ่", explanationDeep: "ระบบนิเวศข้อมูลใหญ่ประกอบด้วยหลายชั้น ตั้งแต่การนำเข้า จัดเก็บ ประมวลผล ไปจนถึงการวิเคราะห์ข้อมูล ทำงานร่วมกันเป็นระบบเดียว", tag: "ecosystem_overview" },
        { q: "ขั้นตอนแรกของระบบนิเวศข้อมูลขนาดใหญ่คืออะไร?", choices: ["Data Processing", "Data Visualization", "Data Ingestion", "Data Deployment"], correct: 2, explanationShort: "ขั้นตอนแรกคือ Data Ingestion — การนำเข้าข้อมูลจากแหล่งต่างๆ", explanationDeep: "Data Ingestion เป็นจุดเริ่มต้นที่รวบรวมข้อมูลจากหลายแหล่ง ทั้ง batch และ real-time ก่อนส่งต่อไปประมวลผล", tag: "data_ingestion" },
        { q: "Apache Kafka ใช้ทำอะไรเป็นหลัก?", choices: ["เก็บข้อมูลแบบ Relational", "สร้าง Dashboard", "รับข้อมูลแบบ Real-time", "เขียน SQL Query"], correct: 2, explanationShort: "Kafka ใช้สำหรับรับและส่งข้อมูลแบบ Real-time (streaming)", explanationDeep: "Apache Kafka เป็น distributed event streaming platform ที่รองรับ throughput สูง เหมาะกับระบบที่ต้องรับข้อมูลปริมาณมากแบบ real-time", tag: "streaming_tools" },
        { q: "Batch Processing คืออะไร?", choices: ["การประมวลผลแบบทันที", "การประมวลผลข้อมูลเป็นรอบ ๆ", "การส่งข้อมูลผ่าน API", "การเก็บข้อมูลดิบ"], correct: 1, explanationShort: "Batch Processing = ประมวลผลข้อมูลเป็นรอบ ๆ ตามช่วงเวลา", explanationDeep: "เช่น ประมวลผลข้อมูลทุกสิ้นวัน/สิ้นเดือน เหมาะกับงานที่ไม่ต้องการผลลัพธ์ทันที เช่น รายงานสรุป", tag: "batch_vs_stream" },
        { q: "Streaming Processing เหมาะกับงานประเภทใด?", choices: ["รายงานยอดขายรายเดือน", "สำรองข้อมูลรายสัปดาห์", "งานที่ต้องการผลลัพธ์ทันที", "วิเคราะห์ข้อมูลย้อนหลัง 5 ปี"], correct: 2, explanationShort: "Streaming เหมาะกับงานที่ต้องการผลลัพธ์ทันที (real-time)", explanationDeep: "เช่น Fraud Detection, การแจ้งเตือนธนาคาร, ระบบ Recommendation ที่ต้องตอบสนองทันที", tag: "batch_vs_stream" },
        { q: "Data at Rest คืออะไร?", choices: ["ข้อมูลที่กำลังไหลเข้าระบบ", "ข้อมูลที่ถูกเก็บไว้แล้ว", "ข้อมูลที่กำลังประมวลผล", "ข้อมูลที่ถูกลบแล้ว"], correct: 1, explanationShort: "Data at Rest = ข้อมูลที่ถูกเก็บไว้แล้วในระบบจัดเก็บ", explanationDeep: "เช่น ไฟล์ใน HDFS, ข้อมูลใน Data Warehouse ที่พร้อมถูกดึงมาวิเคราะห์", tag: "data_state" },
        { q: "Data in Motion คืออะไร?", choices: ["ข้อมูลที่ถูกเก็บไว้แล้ว", "ข้อมูลที่กำลังไหลเข้าระบบ", "ข้อมูลที่ถูกลบ", "ข้อมูลที่ยังไม่ได้สร้าง"], correct: 1, explanationShort: "Data in Motion = ข้อมูลที่กำลังเคลื่อนที่/ไหลเข้าระบบ", explanationDeep: "เป็นข้อมูลที่อยู่ระหว่างการส่งหรือ stream มักถูกประมวลผลด้วย streaming engine", tag: "data_state" },
        { q: "ตัวอย่างของงาน Batch Processing คืออะไร?", choices: ["Fraud Detection", "Notification ธนาคาร", "รายงานยอดขายรายเดือน", "Recommendation แบบ Real-time"], correct: 2, explanationShort: "รายงานยอดขายรายเดือน เป็นตัวอย่างงาน Batch ที่ประมวลผลเป็นรอบ", explanationDeep: "งาน Batch ไม่ต้องการผลทันที เช่น สรุปยอดขาย, รายงานภาษี, backup ข้อมูล", tag: "batch_vs_stream" },
        { q: "ตัวอย่างงาน Streaming Processing คืออะไร?", choices: ["สำรองข้อมูลรายวัน", "Fraud Detection", "รายงานสรุปรายปี", "ETL รายเดือน"], correct: 1, explanationShort: "Fraud Detection ต้องตรวจจับทุจริตทันที จึงเป็นงาน Streaming", explanationDeep: "การตรวจจับการทุจริตต้องวิเคราะห์ธุรกรรมแบบ real-time เพื่อบล็อกทันทีก่อนเกิดความเสียหาย", tag: "batch_vs_stream" },
        { q: "HDFS คืออะไร?", choices: ["ภาษาโปรแกรม", "ระบบจัดเก็บไฟล์แบบกระจาย", "ฐานข้อมูลเชิงสัมพันธ์", "เครื่องมือแสดงผล"], correct: 1, explanationShort: "HDFS = Hadoop Distributed File System — ระบบจัดเก็บไฟล์แบบกระจาย", explanationDeep: "HDFS แบ่งไฟล์เป็น block กระจายเก็บหลายเครื่อง มี replication เพื่อความปลอดภัย รองรับข้อมูลขนาด petabytes", tag: "storage_systems" },
        { q: "NoSQL คืออะไร?", choices: ["ฐานข้อมูลที่ใช้ SQL เท่านั้น", "ฐานข้อมูลที่ไม่เน้น schema", "ระบบปฏิบัติการ", "เครื่องมือ ETL"], correct: 1, explanationShort: "NoSQL = ฐานข้อมูลที่ไม่เน้นโครงสร้าง schema ตายตัว", explanationDeep: "NoSQL รองรับข้อมูลหลายรูปแบบ เช่น document, key-value, graph เหมาะกับ Big Data ที่มีโครงสร้างหลากหลาย", tag: "storage_systems" },
        { q: "MongoDB เป็นฐานข้อมูลประเภทใด?", choices: ["Relational", "NoSQL", "Graph Only", "Time-series Only"], correct: 1, explanationShort: "MongoDB เป็นฐานข้อมูลประเภท NoSQL (Document Store)", explanationDeep: "MongoDB เก็บข้อมูลเป็น JSON-like documents ไม่ต้องกำหนด schema ล่วงหน้า ยืดหยุ่นสูง", tag: "storage_systems" },
        { q: "Data Lake เก็บข้อมูลในรูปแบบใด?", choices: ["เฉพาะ Structured", "เฉพาะ JSON", "Raw ทุกประเภท", "เฉพาะ CSV"], correct: 2, explanationShort: "Data Lake เก็บข้อมูลดิบ (Raw) ทุกประเภท ทุกรูปแบบ", explanationDeep: "รองรับทั้ง structured, semi-structured, unstructured โดยไม่ต้องแปลงก่อนเก็บ ใช้ ELT approach", tag: "lake_vs_warehouse" },
        { q: "Data Warehouse ใช้กระบวนการอะไรในการนำเข้าข้อมูล?", choices: ["ELT", "ETL", "API", "Streaming"], correct: 1, explanationShort: "Data Warehouse ใช้ ETL — Extract, Transform, Load", explanationDeep: "ข้อมูลถูกดึง แปลงให้สะอาดก่อน แล้วจึง load เข้า warehouse เพื่อให้พร้อมใช้วิเคราะห์ทันที", tag: "lake_vs_warehouse" },
        { q: "Data Lake ใช้กระบวนการอะไร?", choices: ["ETL", "ELT", "FTP", "REST"], correct: 1, explanationShort: "Data Lake ใช้ ELT — Extract, Load, Transform", explanationDeep: "โหลดข้อมูลดิบเข้า Lake ก่อน แล้วค่อยแปลงตอนใช้ ทำให้ยืดหยุ่นและรวดเร็วในการ ingest", tag: "lake_vs_warehouse" },
        { q: "ผู้ใช้งาน Data Warehouse หลักคือใคร?", choices: ["Data Scientist", "Software Developer", "Business Analyst", "System Admin"], correct: 2, explanationShort: "Business Analyst เป็นผู้ใช้หลักของ Data Warehouse", explanationDeep: "BA ใช้ข้อมูลที่จัดเตรียมแล้วใน Warehouse เพื่อสร้างรายงาน วิเคราะห์เทรนด์ และตัดสินใจทางธุรกิจ", tag: "lake_vs_warehouse" },
        { q: "ผู้ใช้งาน Data Lake หลักคือใคร?", choices: ["Business Analyst", "Project Manager", "Data Scientist", "HR Manager"], correct: 2, explanationShort: "Data Scientist ใช้ Data Lake เพื่อสำรวจและวิเคราะห์ข้อมูลดิบ", explanationDeep: "Data Scientist ต้องการข้อมูลดิบหลากหลายรูปแบบเพื่อสร้าง model และค้นหา insight ใหม่ๆ", tag: "lake_vs_warehouse" },
        { q: "Data Transformation คืออะไร?", choices: ["การลบข้อมูล", "การแปลงรูปข้อมูล", "การสำรองข้อมูล", "การส่งข้อมูล"], correct: 1, explanationShort: "Data Transformation = การแปลงรูปแบบข้อมูลให้เหมาะสมกับการใช้งาน", explanationDeep: "เช่น เปลี่ยนรูปแบบวันที่ รวมคอลัมน์ สร้าง feature ใหม่ เพื่อให้ข้อมูลพร้อมวิเคราะห์", tag: "data_processing" },
        { q: "Distributed Computing คืออะไร?", choices: ["การใช้คอมพิวเตอร์เครื่องเดียว", "การใช้หลายเครื่องทำงานร่วมกัน", "การเก็บข้อมูลในคลาวด์", "การสร้าง API"], correct: 1, explanationShort: "Distributed Computing = ใช้หลายเครื่องทำงานร่วมกันเพื่อประมวลผล", explanationDeep: "แบ่งงานไปหลาย node ทำพร้อมกัน เพิ่ม throughput และรองรับข้อมูลขนาดใหญ่ได้", tag: "distributed_computing" },
        { q: "Cluster คืออะไร?", choices: ["ซอฟต์แวร์ตัวเดียว", "กลุ่มคอมพิวเตอร์ที่ทำงานร่วมกัน", "ฐานข้อมูลเดี่ยว", "ไฟล์เดียว"], correct: 1, explanationShort: "Cluster = กลุ่มคอมพิวเตอร์ที่เชื่อมต่อและทำงานร่วมกัน", explanationDeep: "Cluster ประกอบด้วย Master Node และ Worker Nodes ทำงานประสานกันเป็นระบบเดียว", tag: "distributed_computing" },
        { q: "Master Node มีหน้าที่อะไร?", choices: ["ประมวลผลข้อมูลทั้งหมด", "จัดการและแบ่งงาน", "เก็บข้อมูลอย่างเดียว", "แสดงผลลัพธ์"], correct: 1, explanationShort: "Master Node ทำหน้าที่จัดการ ควบคุม และแบ่งงานให้ Worker Nodes", explanationDeep: "Master รับ job เข้ามา วางแผนการทำงาน แบ่ง task ไปยัง workers และรวบรวมผลลัพธ์", tag: "distributed_computing" },
        { q: "Worker Node ทำหน้าที่อะไร?", choices: ["จัดการงาน", "ประมวลผล", "สร้าง Dashboard", "ออกแบบระบบ"], correct: 1, explanationShort: "Worker Node ทำหน้าที่ประมวลผลข้อมูลตาม task ที่ได้รับ", explanationDeep: "Worker รับ task จาก Master แล้วประมวลผลข้อมูลส่วนที่ได้รับมอบหมาย ทำงาน parallel กับ workers อื่น", tag: "distributed_computing" },
        { q: "Data Sharding คืออะไร?", choices: ["การเข้ารหัสข้อมูล", "การแบ่งข้อมูลไปหลายเครื่อง", "การสำรองข้อมูล", "การลบข้อมูลซ้ำ"], correct: 1, explanationShort: "Data Sharding = การแบ่งข้อมูลออกไปเก็บหลายเครื่อง", explanationDeep: "แบ่งตาม key เช่น user_id เพื่อกระจาย load และเพิ่มความเร็วในการเข้าถึงข้อมูล", tag: "distributed_computing" },
        { q: "Data Locality คืออะไร?", choices: ["การส่งข้อมูลไปประมวลผลที่อื่น", "ประมวลผลใกล้แหล่งข้อมูล", "การลบข้อมูลเก่า", "การเข้ารหัสข้อมูล"], correct: 1, explanationShort: "Data Locality = ส่ง code ไปประมวลผลใกล้ข้อมูล แทนที่จะย้ายข้อมูล", explanationDeep: "ลดการส่งข้อมูลข้ามเครือข่าย ทำให้เร็วขึ้นอย่างมาก เป็นหลักการสำคัญของ Hadoop", tag: "distributed_computing" },
        { q: "Latency ต่ำ หมายถึงอะไร?", choices: ["ใช้เวลาประมวลผลนาน", "ตอบสนองเร็ว", "ข้อมูลสูญหาย", "ระบบล่ม"], correct: 0, explanationShort: "Latency ต่ำ = ใช้เวลาประมวลผลนาน (ตอบสนองช้า)", explanationDeep: "Latency คือเวลาที่ใช้ในการตอบสนอง ค่าต่ำของ latency ในบางบริบทหมายถึงประสิทธิภาพต่ำ", tag: "performance_concepts" },
        { q: "Backup ระบบเหมาะกับ Batch หรือ Streaming?", choices: ["Streaming", "Batch", "ทั้งสองอย่างเท่ากัน", "ไม่เกี่ยวข้อง"], correct: 1, explanationShort: "Backup เป็นงาน Batch — ทำเป็นรอบตามกำหนดเวลา", explanationDeep: "การ backup ไม่ต้องทำแบบ real-time สามารถกำหนดให้ทำทุกคืนหรือทุกสัปดาห์ได้", tag: "batch_vs_stream" },
        { q: "Notification ธนาคารเหมาะกับระบบใด?", choices: ["Batch", "Streaming", "Manual", "None"], correct: 1, explanationShort: "แจ้งเตือนธนาคาร ต้องทำแบบ Streaming เพื่อแจ้งทันที", explanationDeep: "ลูกค้าต้องได้รับการแจ้งเตือนทันทีเมื่อมีธุรกรรม เพื่อตรวจสอบและรักษาความปลอดภัย", tag: "batch_vs_stream" },
        { q: "Dashboard รายวันใช้ระบบประมวลผลแบบใด?", choices: ["Streaming", "Batch", "Manual", "ไม่มีข้อถูก"], correct: 1, explanationShort: "Dashboard รายวัน ใช้ Batch — รวบรวมข้อมูลแล้วอัพเดตเป็นรอบ", explanationDeep: "Dashboard ที่อัพเดตวันละครั้งไม่ต้องการ real-time สามารถใช้ batch job ประมวลผลตอนกลางคืน", tag: "batch_vs_stream" },
        { q: "Recommendation System มักใช้ระบบใด?", choices: ["Batch", "Streaming", "Manual", "Spreadsheet"], correct: 1, explanationShort: "Recommendation System มักใช้ Streaming เพื่อแนะนำแบบ real-time", explanationDeep: "ระบบแนะนำสินค้าบนเว็บต้องตอบสนองทันทีตามพฤติกรรมผู้ใช้ที่เกิดขึ้น ณ ขณะนั้น", tag: "batch_vs_stream" }
      ],
      ch2: [
        { q: "Data Science คืออะไร?", choices: ["การออกแบบเว็บไซต์", "การใช้สถิติ คอมพิวเตอร์ และความรู้ธุรกิจวิเคราะห์ข้อมูล", "การเขียนโปรแกรมอย่างเดียว", "การจัดการฐานข้อมูล"], correct: 1, explanationShort: "Data Science = สหวิทยาการที่รวมสถิติ คอมพิวเตอร์ และ domain knowledge", explanationDeep: "Data Science ใช้ทั้งสถิติ การเขียนโปรแกรม และความเข้าใจธุรกิจเพื่อสกัด insight จากข้อมูล", tag: "ds_overview" },
        { q: "เป้าหมายหลักของ Data Science คืออะไร?", choices: ["สร้างเว็บไซต์สวยงาม", "Insight Prediction Decision", "เขียน SQL อย่างเดียว", "ออกแบบ UI"], correct: 1, explanationShort: "เป้าหมาย: Insight (เข้าใจ), Prediction (ทำนาย), Decision (ตัดสินใจ)", explanationDeep: "Data Science ช่วยให้เข้าใจข้อมูลเชิงลึก ทำนายสิ่งที่จะเกิด และแนะนำการตัดสินใจที่ดี", tag: "ds_overview" },
        { q: "ขั้นตอนแรกของกระบวนการ Data Science คืออะไร?", choices: ["Modeling", "Business Understanding", "Data Cleaning", "Deployment"], correct: 1, explanationShort: "เริ่มจาก Business Understanding — เข้าใจปัญหาและเป้าหมายธุรกิจ", explanationDeep: "ถ้าไม่เข้าใจปัญหาธุรกิจก่อน การวิเคราะห์อาจตอบผิดคำถาม ทำให้เสียเวลาและทรัพยากร", tag: "ds_process" },
        { q: "Business Understanding ต้องทำอะไร?", choices: ["สร้างโมเดล ML", "ระบุปัญหาและเป้าหมาย", "เขียนโค้ด Python", "ออกแบบ Dashboard"], correct: 1, explanationShort: "ต้องระบุปัญหาและเป้าหมายทางธุรกิจให้ชัดเจน", explanationDeep: "กำหนดว่าธุรกิจต้องการอะไร ปัญหาคืออะไร และ success criteria เป็นอย่างไร", tag: "ds_process" },
        { q: "Data Understanding คืออะไร?", choices: ["การสร้างโมเดล", "ทำความเข้าใจแหล่งและลักษณะข้อมูล", "การ deploy ระบบ", "การทดสอบ UI"], correct: 1, explanationShort: "Data Understanding = สำรวจและทำความเข้าใจข้อมูลที่มีอยู่", explanationDeep: "ดูว่ามีข้อมูลอะไร มาจากไหน คุณภาพเป็นอย่างไร มี missing values หรือ outliers หรือไม่", tag: "ds_process" },
        { q: "Data Preparation คืออะไร?", choices: ["สร้าง Dashboard", "เตรียมข้อมูลให้พร้อมวิเคราะห์", "ส่งมอบงาน", "ออกแบบ UI"], correct: 1, explanationShort: "Data Preparation = เตรียมข้อมูลให้สะอาดและพร้อมใช้วิเคราะห์", explanationDeep: "รวมถึง cleaning, transformation, feature engineering, handling missing values เป็นขั้นตอนที่ใช้เวลามากที่สุด", tag: "data_preparation" },
        { q: "Modeling ในกระบวนการ Data Science คืออะไร?", choices: ["การสร้าง UI", "สร้างโมเดลเพื่อวิเคราะห์ข้อมูล", "การเขียนรายงาน", "การจัดการฐานข้อมูล"], correct: 1, explanationShort: "Modeling = สร้างโมเดล (ML/Statistics) เพื่อหาคำตอบจากข้อมูล", explanationDeep: "เลือก algorithm ที่เหมาะสม train โมเดล tune parameters เพื่อให้ได้ผลลัพธ์ที่ดีที่สุด", tag: "ds_process" },
        { q: "Evaluation ในกระบวนการ Data Science คืออะไร?", choices: ["การรวบรวมข้อมูล", "ประเมินผลโมเดล", "การ deploy", "การสร้าง API"], correct: 1, explanationShort: "Evaluation = ประเมินว่าโมเดลทำงานได้ดีเพียงใด", explanationDeep: "ใช้ metrics เช่น accuracy, precision, recall วัดผล และตรวจสอบว่าตอบโจทย์ธุรกิจหรือไม่", tag: "ds_process" },
        { q: "Deployment คืออะไร?", choices: ["การเก็บข้อมูล", "การทดสอบ", "นำโมเดลไปใช้งานจริง", "การออกแบบ"], correct: 2, explanationShort: "Deployment = นำโมเดลไปใช้งานจริงในระบบ production", explanationDeep: "รวมถึงการ integrate โมเดลเข้ากับระบบ, monitoring, และ maintenance เพื่อให้ทำงานได้ต่อเนื่อง", tag: "ds_process" },
        { q: "ขั้นตอนไหนในกระบวนการ Data Science ใช้เวลาถึง 80%?", choices: ["Modeling", "Deployment", "3 ขั้นตอนแรก (Understanding + Preparation)", "Evaluation"], correct: 2, explanationShort: "3 ขั้นตอนแรก (Business Understanding, Data Understanding, Data Preparation) ใช้เวลาถึง 80%", explanationDeep: "การเตรียมข้อมูลเป็นส่วนที่ใช้เวลาและแรงมากที่สุด แต่เป็นรากฐานสำคัญของผลลัพธ์ที่ดี", tag: "data_preparation" },
        { q: "Data Cleaning คืออะไร?", choices: ["การลบฐานข้อมูล", "ทำความสะอาดข้อมูล", "การสร้าง API", "การออกแบบ schema"], correct: 1, explanationShort: "Data Cleaning = ทำความสะอาดข้อมูล ลบสิ่งผิดพลาดและไม่จำเป็น", explanationDeep: "จัดการ missing values, ลบข้อมูลซ้ำ, แก้ไขรูปแบบไม่สอดคล้อง, จัดการ outliers", tag: "data_preparation" },
        { q: "Missing Value คืออะไร?", choices: ["ค่าที่ถูกต้อง", "ค่าข้อมูลที่หายไป", "ค่าสูงสุด", "ค่าเฉลี่ย"], correct: 1, explanationShort: "Missing Value = ค่าข้อมูลที่หายไป/ไม่มีค่า", explanationDeep: "อาจเกิดจากการเก็บข้อมูลไม่สมบูรณ์ ต้องจัดการเช่น ลบ impute หรือใช้ค่าเฉลี่ยแทน", tag: "data_preparation" },
        { q: "Outlier คืออะไร?", choices: ["ค่าปกติ", "ค่าเฉลี่ย", "ค่าผิดปกติที่แตกต่างจากข้อมูลส่วนใหญ่", "ค่าที่หายไป"], correct: 2, explanationShort: "Outlier = ค่าผิดปกติที่แตกต่างอย่างมากจากข้อมูลส่วนใหญ่", explanationDeep: "อาจเป็นข้อมูลผิดพลาดหรือเหตุการณ์พิเศษ ต้องวิเคราะห์ว่าควรเก็บหรือลบออก", tag: "data_preparation" },
        { q: "Data Selection คืออะไร?", choices: ["ลบข้อมูลทั้งหมด", "เลือกข้อมูลที่เกี่ยวข้อง", "สำรองข้อมูล", "สร้างข้อมูลใหม่"], correct: 1, explanationShort: "Data Selection = เลือกเฉพาะข้อมูลที่เกี่ยวข้องกับปัญหา", explanationDeep: "ไม่ใช่ทุกคอลัมน์หรือทุก record จะมีประโยชน์ ต้องเลือกเฉพาะที่จำเป็นเพื่อลด noise", tag: "data_preparation" },
        { q: "Predictive Analytics คืออะไร?", choices: ["วิเคราะห์อดีต", "วิเคราะห์เพื่อทำนายอนาคต", "วิเคราะห์แบบ manual", "ไม่มีข้อถูก"], correct: 1, explanationShort: "Predictive Analytics = ใช้ข้อมูลและโมเดลเพื่อทำนายสิ่งที่จะเกิด", explanationDeep: "เช่น ทำนายยอดขายเดือนหน้า, ทำนายลูกค้าที่จะยกเลิกบริการ, คาดการณ์ความต้องการสินค้า", tag: "analytics_types" },
        { q: "Descriptive Analytics คืออะไร?", choices: ["วิเคราะห์เพื่อทำนาย", "วิเคราะห์อดีตเพื่อเข้าใจสิ่งที่เกิดขึ้น", "วิเคราะห์เพื่อแนะนำ", "ไม่มีข้อถูก"], correct: 1, explanationShort: "Descriptive Analytics = วิเคราะห์ข้อมูลในอดีตเพื่อเข้าใจสิ่งที่เกิดขึ้น", explanationDeep: "เช่น สรุปยอดขายเดือนที่แล้ว จำนวนผู้ใช้ เทรนด์ที่เกิดขึ้น ตอบคำถาม 'เกิดอะไรขึ้น'", tag: "analytics_types" },
        { q: "Prescriptive Analytics คืออะไร?", choices: ["วิเคราะห์อดีต", "วิเคราะห์เพื่อทำนาย", "วิเคราะห์เพื่อแนะนำการตัดสินใจ", "ไม่มีข้อถูก"], correct: 2, explanationShort: "Prescriptive Analytics = แนะนำว่าควรทำอะไร (what to do)", explanationDeep: "ขั้นสูงสุดของ analytics ให้คำแนะนำเชิงปฏิบัติ เช่น ควรลดราคาเท่าไหร่ ควรเพิ่มสต็อกอะไร", tag: "analytics_types" },
        { q: "Domain Knowledge คืออะไร?", choices: ["ความรู้ทางโปรแกรม", "ความรู้เฉพาะด้าน/สาขา", "ความรู้ทั่วไป", "ความรู้ SQL"], correct: 1, explanationShort: "Domain Knowledge = ความรู้ความเชี่ยวชาญเฉพาะด้าน/สาขาธุรกิจ", explanationDeep: "เช่น ความรู้ด้านการเงิน การแพทย์ การตลาด ที่จำเป็นในการตั้งคำถามและตีความข้อมูลได้ถูกต้อง", tag: "ds_overview" },
        { q: "Structured Data คืออะไร?", choices: ["ข้อมูลรูปภาพ", "ข้อมูลแบบตาราง มีโครงสร้างชัดเจน", "ข้อมูล JSON", "ข้อมูลเสียง"], correct: 1, explanationShort: "Structured Data = ข้อมูลที่มีโครงสร้างตาราง rows/columns ชัดเจน", explanationDeep: "เช่น ข้อมูลในฐานข้อมูลเชิงสัมพันธ์ Excel spreadsheet ที่มี schema กำหนดไว้", tag: "data_types" },
        { q: "Unstructured Data คืออะไร?", choices: ["ข้อมูลตาราง", "ข้อมูลรูปภาพ เสียง วิดีโอ", "ข้อมูล JSON", "ข้อมูลตัวเลข"], correct: 1, explanationShort: "Unstructured Data = ข้อมูลที่ไม่มีโครงสร้าง เช่น รูปภาพ เสียง วิดีโอ", explanationDeep: "ข้อมูลที่ไม่สามารถจัดเป็นตารางได้โดยตรง ต้องใช้เทคนิคพิเศษเช่น NLP, Computer Vision", tag: "data_types" },
        { q: "Semi-structured Data คืออะไร?", choices: ["ข้อมูลตาราง", "ข้อมูลรูปภาพ", "ข้อมูลเช่น JSON, XML ที่มีโครงสร้างบางส่วน", "ข้อมูลเสียง"], correct: 2, explanationShort: "Semi-structured Data = ข้อมูลที่มีโครงสร้างบางส่วน เช่น JSON, XML", explanationDeep: "มี tag หรือ key กำกับแต่ไม่จำเป็นต้องอยู่ในตาราง ยืดหยุ่นกว่า structured", tag: "data_types" },
        { q: "Insight คืออะไร?", choices: ["ข้อมูลดิบ", "ความเข้าใจเชิงลึกจากข้อมูล", "SQL Query", "API Response"], correct: 1, explanationShort: "Insight = ความเข้าใจเชิงลึกที่ได้จากการวิเคราะห์ข้อมูล", explanationDeep: "ไม่ใช่แค่ตัวเลข แต่เป็นความหมายและความรู้ที่ซ่อนอยู่ในข้อมูล นำไปใช้ตัดสินใจได้", tag: "ds_overview" },
        { q: "Segmentation ในบริบท Data Science คืออะไร?", choices: ["การลบข้อมูล", "การแบ่งกลุ่มข้อมูล/ลูกค้า", "การสร้าง API", "การ backup"], correct: 1, explanationShort: "Segmentation = การแบ่งกลุ่มข้อมูลหรือลูกค้าตามลักษณะร่วม", explanationDeep: "เช่น แบ่งลูกค้าตามพฤติกรรมการซื้อ อายุ พื้นที่ เพื่อทำ targeted marketing", tag: "ds_techniques" },
        { q: "Feature Engineering คืออะไร?", choices: ["การลบ feature", "การสร้างตัวแปรใหม่จากข้อมูลที่มี", "การ deploy โมเดล", "การทดสอบ UI"], correct: 1, explanationShort: "Feature Engineering = สร้างตัวแปร/feature ใหม่เพื่อเพิ่มคุณภาพโมเดล", explanationDeep: "เช่น สร้าง 'อายุลูกค้า' จากวันเกิด สร้าง 'ยอดซื้อเฉลี่ย' จากประวัติ เป็นทักษะสำคัญมาก", tag: "ds_techniques" },
        { q: "Data Mining คืออะไร?", choices: ["การขุดเหมือง", "ค้นหารูปแบบและความสัมพันธ์ที่ซ่อนอยู่ในข้อมูล", "การลบข้อมูล", "การสำรองข้อมูล"], correct: 1, explanationShort: "Data Mining = ค้นหา pattern และความรู้ที่ซ่อนอยู่ในข้อมูลจำนวนมาก", explanationDeep: "ใช้เทคนิคเช่น clustering, association rules, classification เพื่อหาสิ่งที่มนุษย์มองไม่เห็น", tag: "ds_techniques" },
        { q: "Machine Learning ใช้ทำอะไรเป็นหลัก?", choices: ["สร้างเว็บไซต์", "สร้างโมเดลที่เรียนรู้จากข้อมูลได้", "จัดการฐานข้อมูล", "ออกแบบ UI"], correct: 1, explanationShort: "Machine Learning = สร้างโมเดลที่เรียนรู้จากข้อมูลและทำนายได้", explanationDeep: "Algorithm เรียนรู้ pattern จาก training data แล้วนำไปทำนายกับข้อมูลใหม่ที่ไม่เคยเห็น", tag: "ds_techniques" },
        { q: "Evaluation Metric คืออะไร?", choices: ["ชื่อฐานข้อมูล", "ตัวชี้วัดประสิทธิภาพโมเดล", "ภาษาโปรแกรม", "เครื่องมือ ETL"], correct: 1, explanationShort: "Evaluation Metric = ตัวชี้วัดที่ใช้ประเมินว่าโมเดลดีแค่ไหน", explanationDeep: "เช่น Accuracy, Precision, Recall, F1-Score, RMSE แต่ละ metric เหมาะกับปัญหาต่างกัน", tag: "ds_process" },
        { q: "Overfitting คืออะไร?", choices: ["โมเดลเรียนรู้ได้ดี", "โมเดลจำข้อมูลมากเกินจนทำนายข้อมูลใหม่ไม่ดี", "โมเดลทำงานเร็ว", "โมเดลใช้ข้อมูลน้อย"], correct: 1, explanationShort: "Overfitting = โมเดลจำข้อมูล training มากเกินไปจนทำนายข้อมูลใหม่ไม่แม่น", explanationDeep: "เหมือนท่องจำคำตอบแทนที่จะเข้าใจ ทำข้อสอบเก่าได้ดีแต่ข้อสอบใหม่ทำไม่ได้", tag: "ds_techniques" },
        { q: "Deployment Risk คืออะไร?", choices: ["ความเสี่ยงในการเขียนโค้ด", "ความเสี่ยงในการนำโมเดลไปใช้งานจริง", "ความเสี่ยงด้าน UI", "ไม่มีความเสี่ยง"], correct: 1, explanationShort: "Deployment Risk = ความเสี่ยงที่อาจเกิดเมื่อนำโมเดลไปใช้จริง", explanationDeep: "เช่น โมเดลทำงานไม่ดีกับข้อมูลจริง, ระบบ infrastructure ไม่รองรับ, ผู้ใช้ไม่เข้าใจผลลัพธ์", tag: "ds_process" }
      ],
      ch3: [
        { q: "Big Data Platform คืออะไร?", choices: ["แอปมือถือ", "ระบบเทคโนโลยีจัดการข้อมูลระดับองค์กร", "ภาษาโปรแกรม", "เว็บเบราว์เซอร์"], correct: 1, explanationShort: "Big Data Platform = ระบบเทคโนโลยีที่ใช้จัดการข้อมูลขนาดใหญ่ระดับองค์กร", explanationDeep: "รวมเครื่องมือ infrastructure และ process ที่องค์กรใช้จัดการ Big Data ตั้งแต่ ingest ถึง insight", tag: "platform_overview" },
        { q: "Data Ingestion ใน platform คืออะไร?", choices: ["การลบข้อมูล", "การนำเข้าข้อมูล", "การสร้าง UI", "การ deploy"], correct: 1, explanationShort: "Data Ingestion = การนำเข้าข้อมูลจากแหล่งต่างๆ เข้าสู่ platform", explanationDeep: "รวบรวมข้อมูลจาก source ต่างๆ ทั้ง batch และ real-time เข้ามาในระบบ", tag: "platform_ingestion" },
        { q: "Data Preparation ใน platform คืออะไร?", choices: ["การลบข้อมูล", "การแปลงและจัด metadata", "การสร้างเว็บ", "การ deploy"], correct: 1, explanationShort: "Data Preparation = แปลงข้อมูลและจัดการ metadata ให้พร้อมใช้", explanationDeep: "ทำ cleansing, transformation, เพิ่ม metadata เพื่อให้ข้อมูลมีคุณภาพและค้นหาได้", tag: "platform_preparation" },
        { q: "Data Insights คืออะไร?", choices: ["การลบข้อมูล", "การสร้างคุณค่าทางธุรกิจ", "การ backup", "การเขียนโค้ด"], correct: 1, explanationShort: "Data Insights = การสร้างคุณค่าทางธุรกิจจากข้อมูล", explanationDeep: "ใช้การวิเคราะห์ วิชวลไลเซชัน และ ML เพื่อค้นหาความรู้ที่นำไปตัดสินใจทางธุรกิจได้", tag: "platform_insights" },
        { q: "Landing Layer คืออะไร?", choices: ["ชั้นวิเคราะห์", "ชั้นเก็บข้อมูลดิบ", "ชั้นแสดงผล", "ชั้นผู้ใช้"], correct: 1, explanationShort: "Landing Layer = ชั้นแรกที่รับและเก็บข้อมูลดิบ", explanationDeep: "ข้อมูลดิบจาก source ต่างๆ ถูก load เข้ามาที่นี่โดยยังไม่แปลง เพื่อเก็บต้นฉบับไว้", tag: "platform_layers" },
        { q: "Structured Layer คืออะไร?", choices: ["เก็บข้อมูลดิบ", "เก็บข้อมูลแบบมีโครงสร้าง", "ลบข้อมูล", "แสดง Dashboard"], correct: 1, explanationShort: "Structured Layer = ชั้นเก็บข้อมูลที่จัดโครงสร้างแล้ว", explanationDeep: "ข้อมูลถูกแปลงให้มี schema ชัดเจน พร้อมสำหรับการ query และวิเคราะห์", tag: "platform_layers" },
        { q: "Curated Layer คืออะไร?", choices: ["เก็บข้อมูลดิบ", "เก็บข้อมูลพร้อมใช้", "ลบข้อมูล", "สร้าง API"], correct: 1, explanationShort: "Curated Layer = ชั้นเก็บข้อมูลที่ผ่านการคัดกรองแล้วพร้อมใช้งาน", explanationDeep: "ข้อมูลที่ผ่าน quality check แล้ว สะอาด ถูกต้อง พร้อมให้ business ใช้งานได้ทันที", tag: "platform_layers" },
        { q: "Analytics Layer คืออะไร?", choices: ["เก็บข้อมูลดิบ", "ชั้นวิเคราะห์ข้อมูล", "ชั้นลบข้อมูล", "ชั้นสำรอง"], correct: 1, explanationShort: "Analytics Layer = ชั้นสำหรับวิเคราะห์ข้อมูล", explanationDeep: "ที่ที่ทำ BI reporting, advanced analytics, ML modeling บนข้อมูลที่เตรียมไว้แล้ว", tag: "platform_layers" },
        { q: "Consumer Layer คืออะไร?", choices: ["ชั้นเก็บข้อมูลดิบ", "พื้นที่ที่ผู้ใช้งานเข้าถึงข้อมูล", "ชั้นลบข้อมูล", "ชั้นสำรอง"], correct: 1, explanationShort: "Consumer Layer = ชั้นที่ผู้ใช้งานปลายทางเข้าถึงข้อมูลและ insight", explanationDeep: "ผู้ใช้เห็น Dashboard, Report, API endpoint ที่นี่ เป็นจุดที่ได้รับคุณค่าจากข้อมูล", tag: "platform_layers" },
        { q: "Scalability คืออะไร?", choices: ["ความเร็ว", "ความสามารถในการขยายระบบ", "ความปลอดภัย", "ความสวยงาม"], correct: 1, explanationShort: "Scalability = ความสามารถในการขยายระบบรองรับงานที่เพิ่มขึ้น", explanationDeep: "ระบบที่ scalable สามารถรองรับข้อมูลและผู้ใช้ที่เพิ่มขึ้นได้โดยไม่กระทบประสิทธิภาพ", tag: "platform_scalability" },
        { q: "Horizontal Scaling คืออะไร?", choices: ["เพิ่มพลังเครื่องเดิม", "เพิ่มจำนวนเครื่อง", "ลดจำนวนเครื่อง", "ลบข้อมูล"], correct: 1, explanationShort: "Horizontal Scaling = ขยายระบบโดยเพิ่มจำนวนเครื่อง", explanationDeep: "เพิ่ม node ใหม่เข้า cluster แทนการอัพเกรดเครื่องเดิม ทำให้ขยายได้ไม่จำกัด", tag: "platform_scalability" },
        { q: "Parallel Processing คืออะไร?", choices: ["ทำงานทีละอย่าง", "ประมวลผลหลายงานพร้อมกัน", "ลบข้อมูล", "สร้าง UI"], correct: 1, explanationShort: "Parallel Processing = ประมวลผลหลายงานพร้อมกัน", explanationDeep: "แบ่งงานใหญ่เป็นงานย่อยๆ แล้วทำพร้อมกันหลาย core/เครื่อง เพิ่มความเร็วอย่างมาก", tag: "platform_scalability" },
        { q: "ตัวอย่าง Structured Data ใน platform คืออะไร?", choices: ["วิดีโอ", "ตารางฐานข้อมูล", "รูปภาพ", "เสียง"], correct: 1, explanationShort: "ตารางฐานข้อมูล เป็นตัวอย่าง Structured Data ที่มี schema ชัดเจน", explanationDeep: "มี rows และ columns ที่กำหนดไว้ สามารถ query ด้วย SQL ได้โดยตรง", tag: "platform_data_types" },
        { q: "ตัวอย่าง Semi-structured Data คืออะไร?", choices: ["ตาราง Excel", "JSON", "วิดีโอ", "รูปภาพ"], correct: 1, explanationShort: "JSON เป็นตัวอย่าง Semi-structured Data ที่มีโครงสร้างบางส่วน", explanationDeep: "มี key-value pairs แต่ไม่จำเป็นต้องมี schema ตายตัว ยืดหยุ่นในการเก็บข้อมูล", tag: "platform_data_types" },
        { q: "ตัวอย่าง Unstructured Data คืออะไร?", choices: ["ตาราง SQL", "JSON", "Video", "CSV"], correct: 2, explanationShort: "Video เป็นตัวอย่าง Unstructured Data ที่ไม่มีโครงสร้าง", explanationDeep: "ไฟล์วิดีโอไม่สามารถจัดเป็น rows/columns ได้ ต้องใช้เทคนิคพิเศษในการวิเคราะห์", tag: "platform_data_types" },
        { q: "On-premise คืออะไร?", choices: ["ใช้ cloud", "ติดตั้งระบบภายในองค์กร", "ใช้ SaaS", "ใช้มือถือ"], correct: 1, explanationShort: "On-premise = ติดตั้งและจัดการระบบภายในองค์กรเอง", explanationDeep: "องค์กรซื้อ hardware ติดตั้ง software และดูแลระบบเอง ควบคุมได้เต็มที่แต่ต้นทุนสูง", tag: "platform_deployment" },
        { q: "Cloud Platform คืออะไร?", choices: ["ติดตั้งในองค์กร", "ใช้บริการผ่านผู้ให้บริการคลาวด์", "ใช้ USB", "ใช้ CD"], correct: 1, explanationShort: "Cloud Platform = ใช้บริการจัดการข้อมูลผ่านผู้ให้บริการ cloud", explanationDeep: "ไม่ต้องลงทุน hardware เอง จ่ายตามใช้ ขยายได้ง่าย เช่น AWS, GCP, Azure", tag: "platform_deployment" },
        { q: "AWS จัดอยู่ในประเภทใด?", choices: ["On-premise", "Cloud Platform", "ภาษาโปรแกรม", "ฐานข้อมูล"], correct: 1, explanationShort: "AWS (Amazon Web Services) เป็น Cloud Platform", explanationDeep: "AWS เป็นผู้ให้บริการ cloud ที่ใหญ่ที่สุด มีบริการครบตั้งแต่ compute, storage, analytics, ML", tag: "platform_deployment" },
        { q: "Google Cloud จัดอยู่ในประเภทใด?", choices: ["On-premise", "Cloud Service", "ภาษาโปรแกรม", "Hardware"], correct: 1, explanationShort: "Google Cloud เป็น Cloud Service/Platform", explanationDeep: "มีจุดเด่นด้าน Big Data (BigQuery) และ AI/ML มี global infrastructure ที่แข็งแกร่ง", tag: "platform_deployment" },
        { q: "Azure คืออะไร?", choices: ["ภาษาโปรแกรม", "Cloud Platform ของ Microsoft", "ฐานข้อมูล", "ระบบปฏิบัติการ"], correct: 1, explanationShort: "Azure เป็น Cloud Platform ของ Microsoft", explanationDeep: "ผสานกับ ecosystem ของ Microsoft ได้ดี เช่น Active Directory, Office 365, Power BI", tag: "platform_deployment" },
        { q: "Metadata คืออะไร?", choices: ["ข้อมูลหลัก", "ข้อมูลที่อธิบายข้อมูล", "ข้อมูลลับ", "ข้อมูลที่ถูกลบ"], correct: 1, explanationShort: "Metadata = ข้อมูลที่อธิบายข้อมูล (data about data)", explanationDeep: "เช่น ชื่อไฟล์ วันที่สร้าง ขนาด ผู้สร้าง schema ช่วยในการค้นหาและจัดการข้อมูล", tag: "platform_governance" },
        { q: "Data Quality Rule คืออะไร?", choices: ["กฎลบข้อมูล", "กฎตรวจสอบคุณภาพข้อมูล", "กฎสร้าง UI", "กฎ deploy"], correct: 1, explanationShort: "Data Quality Rule = กฎที่ใช้ตรวจสอบว่าข้อมูลมีคุณภาพตามมาตรฐาน", explanationDeep: "เช่น ตรวจว่าไม่มี null, ค่าอยู่ในช่วงที่ถูกต้อง, format ตรงตามที่กำหนด", tag: "platform_governance" },
        { q: "Parquet คืออะไร?", choices: ["ภาษาโปรแกรม", "ไฟล์แบบ columnar สำหรับ Big Data", "ฐานข้อมูล", "เครื่องมือ BI"], correct: 1, explanationShort: "Parquet = รูปแบบไฟล์ columnar ที่เหมาะกับ Big Data", explanationDeep: "เก็บข้อมูลแบบแนวคอลัมน์ ทำให้ query เฉพาะบาง column ได้เร็ว และบีบอัดข้อมูลได้ดี", tag: "platform_storage" },
        { q: "Enterprise Scale หมายถึงอะไร?", choices: ["ขนาดเล็ก", "ระดับองค์กรขนาดใหญ่", "ระดับส่วนตัว", "ระดับทดลอง"], correct: 1, explanationShort: "Enterprise Scale = ระดับองค์กรขนาดใหญ่ที่รองรับผู้ใช้และข้อมูลจำนวนมาก", explanationDeep: "ต้องรองรับความต้องการขององค์กรใหญ่ ทั้ง security, compliance, performance, availability", tag: "platform_scalability" },
        { q: "BI คืออะไร?", choices: ["Business Integration", "Business Intelligence", "Big Internet", "Binary Input"], correct: 1, explanationShort: "BI = Business Intelligence — เครื่องมือวิเคราะห์และรายงานข้อมูลธุรกิจ", explanationDeep: "ใช้สร้าง Dashboard รายงาน วิเคราะห์เทรนด์ เพื่อช่วยผู้บริหารตัดสินใจ", tag: "platform_insights" },
        { q: "Advanced Analytics คืออะไร?", choices: ["การสร้างเว็บ", "การวิเคราะห์ขั้นสูง เช่น ML, AI", "การลบข้อมูล", "การ backup"], correct: 1, explanationShort: "Advanced Analytics = การวิเคราะห์ขั้นสูงด้วยเทคนิคเช่น ML และ AI", explanationDeep: "ไปไกลกว่า descriptive analytics ใช้ predictive และ prescriptive เพื่อทำนายและแนะนำ", tag: "platform_insights" },
        { q: "Platform Architecture คืออะไร?", choices: ["การออกแบบ UI", "โครงสร้างและการออกแบบระบบ platform", "การเขียนโค้ด", "การทดสอบ"], correct: 1, explanationShort: "Platform Architecture = โครงสร้างการออกแบบระบบ platform ทั้งหมด", explanationDeep: "กำหนดว่า component ต่างๆ เชื่อมต่อกันอย่างไร data flow เป็นอย่างไร และ scale ได้อย่างไร", tag: "platform_overview" },
        { q: "Integration คืออะไร?", choices: ["การลบข้อมูล", "การรวมข้อมูลจากหลายแหล่ง", "การสร้าง UI", "การ backup"], correct: 1, explanationShort: "Integration = การรวมข้อมูลจากหลายแหล่งและระบบเข้าด้วยกัน", explanationDeep: "เชื่อมต่อระบบต่างๆ เพื่อให้ข้อมูลไหลได้อย่างต่อเนื่อง ลด silo ระหว่างหน่วยงาน", tag: "platform_ingestion" },
        { q: "Pipeline คืออะไร?", choices: ["ท่อน้ำ", "ลำดับขั้นตอนการประมวลผลข้อมูล", "ภาษาโปรแกรม", "ฐานข้อมูล"], correct: 1, explanationShort: "Pipeline = ลำดับขั้นตอนการประมวลผลข้อมูลที่ทำงานต่อเนื่องกัน", explanationDeep: "เช่น ingest → clean → transform → load → analyze ทำงานอัตโนมัติตามลำดับที่กำหนด", tag: "platform_preparation" },
        { q: "Insight Generation คืออะไร?", choices: ["การลบข้อมูล", "การสร้างความรู้และคุณค่าจากข้อมูล", "การ backup", "การสร้างเว็บ"], correct: 1, explanationShort: "Insight Generation = กระบวนการสร้างความรู้เชิงลึกจากข้อมูล", explanationDeep: "ผลลัพธ์สุดท้ายของ data platform คือ insight ที่นำไปสู่การตัดสินใจที่ดีขึ้นสำหรับธุรกิจ", tag: "platform_insights" }
      ],
      ch4: [
        { q: "SQL ย่อมาจากอะไร?", choices: ["Standard Query Logic", "Structured Query Language", "Simple Query Language", "System Query Language"], correct: 1, explanationShort: "SQL = Structured Query Language", explanationDeep: "เป็นภาษามาตรฐานสำหรับจัดการและสืบค้นข้อมูลในฐานข้อมูลเชิงสัมพันธ์", tag: "sql_basics" },
        { q: "SQL ใช้กับระบบฐานข้อมูลประเภทใด?", choices: ["NoSQL", "Relational Database", "Graph Database", "Document Store"], correct: 1, explanationShort: "SQL ใช้กับ Relational Database (ฐานข้อมูลเชิงสัมพันธ์)", explanationDeep: "RDBMS เช่น MySQL, PostgreSQL, Oracle, SQL Server ใช้ตาราง rows/columns และ SQL ในการจัดการ", tag: "sql_basics" },
        { q: "SQL สามารถอ่านออกเสียงได้กี่แบบ?", choices: ["1 แบบ", "2 แบบ", "3 แบบ", "4 แบบ"], correct: 1, explanationShort: "SQL อ่านได้ 2 แบบ: 'เอส-คิว-แอล' และ 'ซีเควล'", explanationDeep: "ทั้งสองแบบเป็นที่ยอมรับ แต่ 'ซีเควล' มาจากชื่อเดิม SEQUEL ของ IBM", tag: "sql_basics" },
        { q: "SELECT ใช้ทำอะไร?", choices: ["เพิ่มข้อมูล", "ดึงข้อมูลจากตาราง", "ลบข้อมูล", "สร้างตาราง"], correct: 1, explanationShort: "SELECT ใช้ดึง/สืบค้นข้อมูลจากตาราง", explanationDeep: "เป็นคำสั่ง DML ที่ใช้บ่อยที่สุด สามารถระบุ column, เงื่อนไข, การเรียงลำดับได้", tag: "sql_commands" },
        { q: "INSERT ใช้ทำอะไร?", choices: ["ดึงข้อมูล", "เพิ่มข้อมูลใหม่เข้าตาราง", "ลบข้อมูล", "แก้ไขโครงสร้าง"], correct: 1, explanationShort: "INSERT ใช้เพิ่มข้อมูลใหม่ (row) เข้าไปในตาราง", explanationDeep: "ต้องระบุค่าให้ตรงกับ column ที่กำหนด และต้องไม่ละเมิด constraint ต่างๆ", tag: "sql_commands" },
        { q: "UPDATE ใช้ทำอะไร?", choices: ["เพิ่มข้อมูล", "ลบข้อมูล", "แก้ไขข้อมูลที่มีอยู่", "สร้างตาราง"], correct: 2, explanationShort: "UPDATE ใช้แก้ไขข้อมูลที่มีอยู่แล้วในตาราง", explanationDeep: "มักใช้กับ WHERE เพื่อระบุ row ที่ต้องการแก้ ถ้าไม่ใส่ WHERE จะแก้ทุก row", tag: "sql_commands" },
        { q: "DELETE ใช้ทำอะไร?", choices: ["เพิ่มข้อมูล", "ดึงข้อมูล", "ลบข้อมูลออกจากตาราง", "สร้างตาราง"], correct: 2, explanationShort: "DELETE ใช้ลบข้อมูล (row) ออกจากตาราง", explanationDeep: "ต้องระวังใช้กับ WHERE เสมอ ไม่งั้นจะลบทุก row ข้อมูลที่ลบแล้วกู้คืนได้ยาก", tag: "sql_commands" },
        { q: "DDL คืออะไร?", choices: ["คำสั่งจัดการข้อมูล", "คำสั่งกำหนดโครงสร้างฐานข้อมูล", "คำสั่งควบคุมสิทธิ์", "คำสั่ง query"], correct: 1, explanationShort: "DDL = Data Definition Language — คำสั่งกำหนดโครงสร้าง", explanationDeep: "เช่น CREATE TABLE, ALTER TABLE, DROP TABLE ใช้สร้างและแก้ไขโครงสร้างฐานข้อมูล", tag: "sql_categories" },
        { q: "DML คืออะไร?", choices: ["คำสั่งกำหนดโครงสร้าง", "คำสั่งจัดการข้อมูล", "คำสั่งควบคุมสิทธิ์", "คำสั่ง backup"], correct: 1, explanationShort: "DML = Data Manipulation Language — คำสั่งจัดการข้อมูล", explanationDeep: "เช่น SELECT, INSERT, UPDATE, DELETE ใช้จัดการข้อมูลภายในตาราง", tag: "sql_categories" },
        { q: "DCL คืออะไร?", choices: ["คำสั่งจัดการข้อมูล", "คำสั่งกำหนดโครงสร้าง", "คำสั่งควบคุมสิทธิ์การเข้าถึง", "คำสั่ง query"], correct: 2, explanationShort: "DCL = Data Control Language — คำสั่งควบคุมสิทธิ์การเข้าถึง", explanationDeep: "เช่น GRANT, REVOKE ใช้ให้และถอนสิทธิ์ผู้ใช้ในการเข้าถึงข้อมูล", tag: "sql_categories" },
        { q: "CHAR(n) คืออะไร?", choices: ["ตัวเลขจำนวนเต็ม", "ตัวอักษรความยาวคงที่", "ตัวอักษรความยาวไม่คงที่", "วันที่"], correct: 1, explanationShort: "CHAR(n) = ชนิดข้อมูลตัวอักษรที่มีความยาวคงที่ n ตัว", explanationDeep: "ถ้าข้อมูลสั้นกว่า n จะเติมช่องว่าง เหมาะกับข้อมูลที่มีความยาวเท่ากันเสมอ เช่น รหัสจังหวัด", tag: "sql_datatypes" },
        { q: "VARCHAR(n) คืออะไร?", choices: ["ตัวเลข", "ตัวอักษรความยาวคงที่", "ตัวอักษรความยาวไม่คงที่", "Boolean"], correct: 2, explanationShort: "VARCHAR(n) = ตัวอักษรที่มีความยาวไม่คงที่ สูงสุด n ตัว", explanationDeep: "ใช้พื้นที่ตามข้อมูลจริง ไม่เติมช่องว่าง ประหยัดพื้นที่กว่า CHAR เหมาะกับชื่อ ที่อยู่", tag: "sql_datatypes" },
        { q: "DEC(m,n) คืออะไร?", choices: ["ตัวอักษร", "ตัวเลขทศนิยม", "วันที่", "Boolean"], correct: 1, explanationShort: "DEC(m,n) = ตัวเลขทศนิยม m หลัก มีทศนิยม n ตำแหน่ง", explanationDeep: "เช่น DEC(10,2) เก็บตัวเลขได้ 10 หลัก มีทศนิยม 2 ตำแหน่ง เหมาะกับข้อมูลการเงิน", tag: "sql_datatypes" },
        { q: "Primary Key คืออะไร?", choices: ["คีย์สำรอง", "คีย์หลักที่ระบุ row ได้ไม่ซ้ำ", "คีย์เชื่อมตาราง", "คีย์ลบข้อมูล"], correct: 1, explanationShort: "Primary Key = คีย์หลักที่ใช้ระบุแต่ละ row ได้ไม่ซ้ำกัน", explanationDeep: "ต้อง unique และ not null ทุกตารางควรมี primary key เพื่อระบุตัวตนของข้อมูล", tag: "sql_keys" },
        { q: "Foreign Key คืออะไร?", choices: ["คีย์หลัก", "คีย์ที่ใช้เชื่อมความสัมพันธ์ระหว่างตาราง", "คีย์ลบข้อมูล", "คีย์สำรอง"], correct: 1, explanationShort: "Foreign Key = คีย์ที่เชื่อมความสัมพันธ์ระหว่างตาราง", explanationDeep: "อ้างอิง primary key ของอีกตาราง เพื่อรักษา referential integrity ระหว่างตาราง", tag: "sql_keys" },

    /* Chapter metadata */
    const CHAPTERS = [
      { id: "ch1", title: "Big Data Ecosystem", icon: "🔵", desc: "ระบบนิเวศข้อมูลขนาดใหญ่ การประมวลผล Batch/Stream และ Data Lake vs Warehouse", color: "#6c63ff" },
      { id: "ch2", title: "Data Science & Data Analysis", icon: "🟢", desc: "กระบวนการ Data Science, Analytics Types, Cleaning และ Feature Engineering", color: "#00e676" },
      { id: "ch3", title: "Big Data Platforms", icon: "🟠", desc: "สถาปัตยกรรม Platform, Data Layers, Scalability และ Cloud Services", color: "#ff9800" },
      { id: "ch4", title: "SQL for Analytical Thinking", icon: "🔴", desc: "คำสั่ง SQL, Data Types, Keys, JOINs, Aggregation และ Advanced SQL", color: "#ff5252" }
    ];
    /* Use all questions in the pool */
    const STORAGE_KEY = "quizLearningPlatform_v1";

    /* Topic tag display names for analytics */
    const TAG_NAMES = {
      ecosystem_overview: "ภาพรวม Ecosystem", data_ingestion: "Data Ingestion", streaming_tools: "Streaming Tools", batch_vs_stream: "Batch vs Stream", data_state: "สถานะข้อมูล", storage_systems: "ระบบจัดเก็บ", lake_vs_warehouse: "Lake vs Warehouse", data_processing: "Data Processing", distributed_computing: "Distributed Computing", performance_concepts: "Performance Concepts",
      ds_overview: "ภาพรวม Data Science", ds_process: "กระบวนการ DS", data_preparation: "Data Preparation", analytics_types: "ประเภท Analytics", data_types: "ประเภทข้อมูล", ds_techniques: "เทคนิค DS",
      platform_overview: "ภาพรวม Platform", platform_ingestion: "Platform Ingestion", platform_preparation: "Platform Preparation", platform_insights: "Platform Insights", platform_layers: "Data Layers", platform_scalability: "Scalability", platform_data_types: "ประเภทข้อมูลใน Platform", platform_deployment: "การ Deploy", platform_governance: "Data Governance", platform_storage: "Platform Storage",
      sql_basics: "พื้นฐาน SQL", sql_commands: "คำสั่ง SQL", sql_categories: "หมวดคำสั่ง SQL", sql_datatypes: "ชนิดข้อมูล SQL", sql_keys: "Keys", sql_joins: "JOINs", sql_filtering: "การกรองข้อมูล", sql_grouping: "การจัดกลุ่ม", sql_sorting: "การเรียงลำดับ", sql_aggregation: "Aggregate Functions", sql_advanced: "SQL ขั้นสูง", sql_analytical: "Analytical SQL"
    };

    /* ============================================================
       STATE MANAGEMENT
       ============================================================ */
    const State = {
      currentChapter: null,
      questions: [],
      currentIndex: 0,
      answers: [],
      score: 0,
      answered: false,
      startTime: 0,
      questionTimes: [],

      load() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
      },
      save(data) {
        const existing = this.load();
        Object.assign(existing, data);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(existing)); } catch (e) { console.error("localStorage save failed", e); }
      },
      getChapterData(chId) {
        const d = this.load();
        return d[chId] || { lastScore: null, bestScore: null, attempts: 0, mistakes: {} };
      },
      saveChapterResult(chId, score, total, mistakes) {
        const prev = this.getChapterData(chId);
        const newData = {
          lastScore: score,
          bestScore: Math.max(score, prev.bestScore || 0),
          attempts: (prev.attempts || 0) + 1,
          mistakes: {}
        };
        /* merge mistake counts */
        const oldM = prev.mistakes || {};
        const allTags = new Set([...Object.keys(oldM), ...Object.keys(mistakes)]);
        allTags.forEach(t => { newData.mistakes[t] = (oldM[t] || 0) + (mistakes[t] || 0); });
        this.save({ [chId]: newData });
      },
      resetAll() {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) { }
      }
    };

    /* ============================================================
       UTILITIES
       ============================================================ */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function shuffleChoices(q) {
      const indices = q.choices.map((_, i) => i);
      const shuffled = shuffle(indices);
      const newChoices = shuffled.map(i => q.choices[i]);
      const newCorrect = shuffled.indexOf(q.correct);
      return { ...q, choices: newChoices, correct: newCorrect, _origChoices: q.choices, _origCorrect: q.correct };
    }

    function $(id) { return document.getElementById(id); }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      $(id).classList.add("active");
      $(id).style.animation = "none";
      $(id).offsetHeight; /* trigger reflow */
      $(id).style.animation = "fadeUp .4s ease";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function toast(msg) {
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    /* ============================================================
       QUIZ ENGINE (QZ namespace)
       ============================================================ */
    const QZ = {
      /* --- HOME --- */
      renderHome() {
        const list = $("chapterList");
        list.innerHTML = CHAPTERS.map((ch, i) => {
          const data = State.getChapterData(ch.id);
          const total = QUESTION_BANK[ch.id].length;
          const badge = data.attempts > 0 ? (data.lastScore >= total * 0.8 ? '<span class="ch-badge badge-done">✓ ผ่านแล้ว</span>' : '<span class="ch-badge badge-retry">ลองอีกครั้ง</span>') : '<span class="ch-badge badge-new">ยังไม่เริ่ม</span>';
          const scoreTxt = data.lastScore !== null ? `<span class="ch-score">${data.lastScore}/${total}</span>` : '';
          return `<div class="ch-card" onclick="QZ.startChapter('${ch.id}')" tabindex="0" role="button" aria-label="เริ่ม ${ch.title}">
        <h3><span class="ch-icon">${ch.icon}</span>${ch.title}</h3>
        <div class="ch-desc">${ch.desc}</div>
        <div class="ch-meta">${badge}${scoreTxt}</div>
      </div>`;
        }).join("");

        /* global stats */
        const allData = State.load();
        let totalAttempts = 0, totalCorrect = 0, totalQuestions = 0;
        CHAPTERS.forEach(ch => {
          const d = allData[ch.id];
          if (d && d.attempts > 0) {
            totalAttempts += d.attempts;
            totalCorrect += d.lastScore || 0;
            totalQuestions += QUESTION_BANK[ch.id].length;
          }
        });
        const completed = CHAPTERS.filter(ch => { const d = allData[ch.id]; return d && d.attempts > 0; }).length;
        $("globalStats").innerHTML = `
      <div class="gs-item"><div class="gs-val">${completed}/4</div><div class="gs-lbl">บทเรียนที่ทำแล้ว</div></div>
      <div class="gs-item"><div class="gs-val">${totalAttempts}</div><div class="gs-lbl">จำนวนครั้งที่ทำ</div></div>
      <div class="gs-item"><div class="gs-val">${totalQuestions > 0 ? Math.round(totalCorrect / totalQuestions * 100) : 0}%</div><div class="gs-lbl">ความแม่นยำรวม</div></div>
    `;
      },

      /* --- START CHAPTER --- */
      startChapter(chId) {
        State.currentChapter = chId;
        const pool = QUESTION_BANK[chId];
        const shuffled = shuffle(pool);
        State.questions = shuffled.map(shuffleChoices);
        State.currentIndex = 0;
        State.answers = [];
        State.score = 0;
        State.answered = false;
        State.questionTimes = [];
        State.startTime = Date.now();

        const ch = CHAPTERS.find(c => c.id === chId);
        $("quizTitle").textContent = ch.icon + " " + ch.title;
        showScreen("quizScreen");
        this.renderQuestion();
      },

      /* --- RENDER QUESTION --- */
      renderQuestion() {
        const q = State.questions[State.currentIndex];
        const total = State.questions.length;
        const idx = State.currentIndex;

        $("quizCounter").textContent = `${idx + 1} / ${total}`;
        $("progressFill").style.width = `${((idx) / total) * 100}%`;
        $("nextBtn").disabled = true;
        State.answered = false;
        State.startTime = Date.now();

        const labels = ["A", "B", "C", "D"];
        $("questionArea").innerHTML = `
      <div class="q-card">
        <div class="q-text">${q.q}</div>
        <span class="q-tag">${TAG_NAMES[q.tag] || q.tag}</span>
        <div class="choices">
          ${q.choices.map((c, i) => `<button class="choice-btn" id="choice${i}" onclick="QZ.selectAnswer(${i})" aria-label="ตัวเลือก ${labels[i]}">
            <span class="c-label">${labels[i]}</span><span>${c}</span>
          </button>`).join("")}
        </div>
        <div class="explanation" id="explanation">
          <h4>💡 คำอธิบาย</h4>
          <div class="exp-short">${q.explanationShort}</div>
          <div class="exp-deep" id="expDeep" style="display:none">${q.explanationDeep}</div>
          <span class="exp-toggle" id="expToggle" onclick="QZ.toggleDeep()">▶ ดูคำอธิบายเพิ่มเติม</span>
        </div>
      </div>`;
      },

      /* --- SELECT ANSWER --- */
      selectAnswer(idx) {
        if (State.answered) return;
        State.answered = true;

        const q = State.questions[State.currentIndex];
        const isCorrect = idx === q.correct;
        const elapsed = Date.now() - State.startTime;
        State.questionTimes.push(elapsed);

        State.answers.push({ questionIndex: State.currentIndex, selected: idx, correct: q.correct, isCorrect, tag: q.tag, time: elapsed });
        if (isCorrect) State.score++;

        /* highlight buttons */
        document.querySelectorAll(".choice-btn").forEach((btn, i) => {
          btn.classList.add("locked");
          if (i === q.correct) btn.classList.add("correct");
          if (i === idx && !isCorrect) btn.classList.add("wrong");
        });

        /* show explanation */
        $("explanation").classList.add("show");
        $("nextBtn").disabled = false;
        $("nextBtn").textContent = State.currentIndex < State.questions.length - 1 ? "ถัดไป →" : "🏆 ดูผลลัพธ์";
        $("nextBtn").focus();
      },

      toggleDeep() {
        const d = $("expDeep");
        const t = $("expToggle");
        if (d.style.display === "none") {
          d.style.display = "block";
          t.textContent = "▼ ซ่อนคำอธิบาย";
        } else {
          d.style.display = "none";
          t.textContent = "▶ ดูคำอธิบายเพิ่มเติม";
        }
      },

      /* --- NEXT --- */
      next() {
        if (!State.answered) return;
        State.currentIndex++;
        if (State.currentIndex >= State.questions.length) {
          this.showResult();
        } else {
          this.renderQuestion();
        }
      },

      /* --- SHOW RESULT --- */
      showResult() {
        const total = State.questions.length;
        const score = State.score;
        const pct = Math.round((score / total) * 100);
        const chId = State.currentChapter;
        const ch = CHAPTERS.find(c => c.id === chId);

        /* save mistakes */
        const mistakes = {};
        State.answers.filter(a => !a.isCorrect).forEach(a => { mistakes[a.tag] = (mistakes[a.tag] || 0) + 1; });
        State.saveChapterResult(chId, score, total, mistakes);

        /* grade */
        let grade, gradeColor, msg;
        if (pct >= 90) { grade = "A+"; gradeColor = "#00e676"; msg = "ยอดเยี่ยม! คุณเข้าใจเนื้อหาเป็นอย่างดี 🎉"; }
        else if (pct >= 80) { grade = "A"; gradeColor = "#69f0ae"; msg = "ดีมาก! เกือบสมบูรณ์แบบ 👏"; }
        else if (pct >= 70) { grade = "B"; gradeColor = "#ffd740"; msg = "ดี แต่ยังมีจุดที่ควรทบทวน 📖"; }
        else if (pct >= 60) { grade = "C"; gradeColor = "#ffb74d"; msg = "พอใช้ ควรทบทวนเนื้อหาเพิ่มเติม ⚡"; }
        else { grade = "D"; gradeColor = "#ff5252"; msg = "ต้องปรับปรุง ลองอ่านทบทวนแล้วทำใหม่ 💪"; }

        /* score ring circumference = 2*PI*54 ≈ 339.292 */
        const circ = 339.292;
        const offset = circ - (circ * pct / 100);

        $("resultTitle").textContent = ch.icon + " ผลลัพธ์: " + ch.title;
        $("resultHero").innerHTML = `
      <div class="score-ring">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle class="bg" cx="80" cy="80" r="54"/>
          <circle class="fg" cx="80" cy="80" r="54" stroke="${gradeColor}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" style="--target:${offset};animation:scoreReveal 1.5s ease forwards"/>
        </svg>
        <div class="score-text">
          <div class="score-num" style="color:${gradeColor}">${score}</div>
          <div class="score-of">จาก ${total} ข้อ</div>
        </div>
      </div>
      <div class="result-grade" style="color:${gradeColor}">เกรด ${grade}</div>
      <div class="result-msg">${msg}</div>`;

        /* metrics */
        const avgTime = State.questionTimes.length > 0 ? Math.round(State.questionTimes.reduce((a, b) => a + b, 0) / State.questionTimes.length / 1000 * 10) / 10 : 0;
        const wrong = total - score;
        $("metricsArea").innerHTML = `
      <div class="metric-card"><div class="m-val" style="color:var(--success)">${score}</div><div class="m-lbl">ตอบถูก</div></div>
      <div class="metric-card"><div class="m-val" style="color:var(--error)">${wrong}</div><div class="m-lbl">ตอบผิด</div></div>
      <div class="metric-card"><div class="m-val" style="color:var(--secondary)">${pct}%</div><div class="m-lbl">ความแม่นยำ</div></div>
      <div class="metric-card"><div class="m-val" style="color:var(--warning)">${avgTime}s</div><div class="m-lbl">เวลาเฉลี่ย/ข้อ</div></div>`;

        /* weakness panel */
        const chData = State.getChapterData(chId);
        const allMistakes = chData.mistakes || {};
        const sorted = Object.entries(allMistakes).sort((a, b) => b[1] - a[1]).slice(0, 5);
        if (sorted.length > 0) {
          const tips = {
            batch_vs_stream: "ทบทวน Batch vs Streaming Processing", data_preparation: "ฝึกเรื่อง Data Preparation",
            sql_filtering: "ฝึกการใช้ WHERE กรองข้อมูล", sql_grouping: "ทบทวน GROUP BY และ HAVING",
            platform_layers: "ทบทวน Data Layers ของ Platform", ds_process: "ทบทวนกระบวนการ Data Science",
            sql_aggregation: "ฝึก Aggregate Functions", distributed_computing: "ทบทวน Distributed Computing"
          };
          $("weaknessArea").innerHTML = `
        <div class="weakness-panel">
          <h3>⚠️ จุดอ่อนที่ควรทบทวน</h3>
          ${sorted.map(([tag, count]) => `<div class="weakness-item">
            <div><div class="w-tag">${TAG_NAMES[tag] || tag}</div><div class="w-tip">${tips[tag] || "ทบทวนเนื้อหาในหัวข้อนี้"}</div></div>
            <div class="w-count">ผิด ${count} ครั้ง</div>
          </div>`).join("")}
        </div>`;
        } else {
          $("weaknessArea").innerHTML = "";
        }

        /* review list */
        $("reviewList").innerHTML = State.answers.map((a, i) => {
          const q = State.questions[a.questionIndex];
          return `<div class="review-item ${a.isCorrect ? "was-correct" : ""}">
        <div class="r-q">${i + 1}. ${q.q}</div>
        <div class="r-your">${a.isCorrect ? "✓" : "✗"} คำตอบของคุณ: ${q.choices[a.selected]}</div>
        ${!a.isCorrect ? `<div class="r-correct">✓ คำตอบที่ถูก: ${q.choices[a.correct]}</div>` : ""}
        <div class="r-exp">💡 ${q.explanationShort}</div>
      </div>`;
        }).join("");

        /* actions */
        $("resultActions").innerHTML = `
      <button class="btn btn-primary" onclick="QZ.startChapter('${chId}')">🔄 ทำใหม่อีกครั้ง</button>
      <button class="btn btn-secondary" onclick="QZ.backToMenu()">← กลับเมนูหลัก</button>
      <button class="btn btn-danger" onclick="QZ.resetProgress('${chId}')">🗑 ล้างประวัติบทนี้</button>`;

        $("progressFill").style.width = "100%";
        showScreen("resultScreen");
      },

      /* --- NAVIGATION --- */
      backToMenu() {
        showScreen("homeScreen");
        this.renderHome();
      },

      resetProgress(chId) {
        if (!confirm("ต้องการล้างประวัติบทนี้หรือไม่?")) return;
        const data = State.load();
        delete data[chId];
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { }
        toast("ล้างประวัติเรียบร้อยแล้ว");
        this.backToMenu();
      },

      resetAll() {
        if (!confirm("ต้องการล้างประวัติทั้งหมดหรือไม่?")) return;
        State.resetAll();
        toast("ล้างข้อมูลทั้งหมดเรียบร้อย");
        this.backToMenu();
      }
    };

    /* ============================================================
       KEYBOARD SUPPORT
       ============================================================ */
    document.addEventListener("keydown", (e) => {
      if ($("quizScreen").classList.contains("active")) {
        const keyMap = { "1": 0, "2": 1, "3": 2, "4": 3, "a": 0, "b": 1, "c": 2, "d": 3 };
        if (e.key.toLowerCase() in keyMap && !State.answered) {
          QZ.selectAnswer(keyMap[e.key.toLowerCase()]);
        } else if ((e.key === "Enter" || e.key === " ") && State.answered) {
          e.preventDefault();
          QZ.next();
        }
      }
      if ($("homeScreen").classList.contains("active")) {
        if (e.key >= "1" && e.key <= "4") {
          QZ.startChapter("ch" + e.key);
        }
      }
    });

    /* Init */
    QZ.renderHome();
  </script>
</body>

</html>
